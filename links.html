<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mahmoud Abd Elazim | Links</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0d1b3e;
      --accent: #3b82f6;
      --cyan:   #38bdf8;
      --text:   #e2e8f0;
      --muted:  #94a3b8;
      --card:   rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.1);
    }

    body {
      background: radial-gradient(ellipse at 65% 35%, #1a3a7c 0%, #0d1b3e 45%, #060e24 100%);
      min-height: 100vh;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      animation: fadeUp .5s ease both;
    }

    /* PHOTO */
    .photo-wrap {
      position: relative;
      width: 170px;
      height: 170px;
    }
    .photo-wrap::before {
      content: '';
      position: absolute;
      inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, transparent 190deg, var(--cyan) 360deg);
      animation: spin 7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .photo-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: #0d1b3e;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .photo-inner img {
      width: calc(100% - 6px);
      height: calc(100% - 6px);
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #0d1b3e;
    }
    .photo-placeholder {
      width: calc(100% - 6px);
      height: calc(100% - 6px);
      border-radius: 50%;
      border: 3px solid #0d1b3e;
      background: linear-gradient(135deg,#1a3a7c,#0d1b3e);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .photo-placeholder i { font-size: 2.5rem; color: rgba(59,130,246,.4); }

    /* NAME */
    .name {
      text-align: center;
    }
    .name h1 {
      font-size: 1.35rem;
      font-weight: 800;
      color: #fff;
      margin-bottom: .2rem;
    }
    .name p {
      font-size: .82rem;
      color: var(--cyan);
      font-weight: 600;
      letter-spacing: .05em;
    }

    /* SOCIAL ICONS ROW */
    .socials {
      display: flex;
      gap: .65rem;
    }
    .soc {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: rgba(255,255,255,.07);
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      text-decoration: none;
      font-size: .9rem;
      transition: all .2s;
    }
    .soc:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: rgba(59,130,246,.1);
      transform: translateY(-2px);
    }

    /* DIVIDER */
    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
    }

    /* LINK CARDS */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: .95rem 1.2rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 13px;
      color: var(--text);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 500;
      transition: all .2s;
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(59,130,246,.08), transparent);
      opacity: 0;
      transition: opacity .2s;
    }
    .link-card:hover {
      border-color: rgba(59,130,246,.45);
      transform: translateY(-2px);
      color: #fff;
    }
    .link-card:hover::before { opacity: 1; }

    .link-ico {
      width: 38px;
      height: 38px;
      border-radius: 9px;
      background: rgba(59,130,246,.14);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
      transition: background .2s;
    }
    .link-card:hover .link-ico { background: rgba(59,130,246,.25); }

    .link-text { flex: 1; }
    .link-title { font-weight: 600; font-size: .88rem; }
    .link-sub { font-size: .72rem; color: var(--muted); margin-top: .1rem; }

    .link-arrow {
      color: var(--muted);
      font-size: .75rem;
      transition: transform .2s, color .2s;
    }
    .link-card:hover .link-arrow {
      transform: translateX(3px);
      color: var(--accent);
    }

    /* WHATSAPP special */
    .link-card.wa { border-color: rgba(37,211,102,.2); }
    .link-card.wa .link-ico { background: rgba(37,211,102,.12); color: #25d366; }
    .link-card.wa:hover { border-color: rgba(37,211,102,.5); }
    .link-card.wa:hover .link-ico { background: rgba(37,211,102,.25); }

    /* LINKEDIN special */
    .link-card.li .link-ico { background: rgba(10,102,194,.15); color: #0a66c2; }
    .link-card.li:hover { border-color: rgba(10,102,194,.5); }

    /* GITHUB special */
    .link-card.gh .link-ico { background: rgba(255,255,255,.08); color: #fff; }

    /* EMAIL special */
    .link-card.em .link-ico { background: rgba(59,130,246,.14); color: var(--accent); }

    /* FOOTER */
    .footer {
      font-size: .7rem;
      color: var(--muted);
      text-align: center;
      margin-top: .5rem;
    }
    .footer a { color: var(--accent); text-decoration: none; }
    .footer a:hover { text-decoration: underline; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .link-card { animation: fadeUp .4s ease both; }
    .link-card:nth-child(1) { animation-delay: .1s; }
    .link-card:nth-child(2) { animation-delay: .18s; }
    .link-card:nth-child(3) { animation-delay: .26s; }
    .link-card:nth-child(4) { animation-delay: .34s; }
  </style>
</head>
